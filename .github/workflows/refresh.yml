name: Refresh channel + feed cache

on:
  schedule:
    # Svaka 2 sata — sigurno svjeze, nije cesto da pojeli quota
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel revalidation
        run: |
          curl -fsS "https://balkanbiz.live/api/cron/refresh"
